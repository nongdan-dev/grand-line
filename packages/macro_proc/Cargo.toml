[package]
name = "_proc"
version = "0.0.0"
edition = "2024"

[lib]
name = "_proc"
path = "lib.rs"
proc-macro = true

[features]
postgres = []
# debug macro flags
debug_macro = []
debug_macro_cli = ["debug_macro", "colored", "prettyplease"]
debug_macro_file = ["debug_macro"]
# model flags
model_created_at = []
model_updated_at = []
model_deleted_at = []
model_by_id = []
# resolver flags
resolver_tx = []
resolver_ctx = []
resolver_include_deleted = []
resolver_permanent_delete = []
resolver_authz_row = []
# biz
auth = []
authz = []

[dependencies]
_utils = { path = "../macro_utils", default-features = false }
_utils_proc = { path = "../macro_utils_proc", default-features = false }
colored = { version = "^3.1", optional = true, default-features = false }
prettyplease = { version = "^0.2", optional = true, default-features = false }

[lints]
workspace = true
