[package]
name = "_utils"
version = "0.0.0"
edition = "2024"

[lib]
name = "_utils"
path = "lib.rs"

[dependencies]
heck = { version = "^0.5", default-features = false }
maplit = { version = "^1.0", default-features = false }
proc-macro2 = { version = "^1.0", default-features = false }
quote = { version = "^1.0", default-features = false }
serde = { version = "^1.0", default-features = false }
strum = { version = "^0.28", default-features = false }
strum_macros = { version = "^0.28", default-features = false }
syn = { version = "^2.0", default-features = false, features = ["full", "clone-impls", "parsing", "printing"] }
ulid = { version = "^1.2", default-features = false, features = ["std"] }

[lints]
workspace = true
