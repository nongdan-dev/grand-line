[package]
name = "_formula"
version = "0.0.0"
edition = "2024"

[lib]
name = "_formula"
path = "lib.rs"

[dependencies]
_core = { path = "../core", default-features = false }
rhai = { version = "^1.25", default-features = false, features = ["sync", "serde", "internals", "no_module", "no_closure", "no_time"] }
sourcemap = { version = "9", default-features = false }
thiserror = { version = "^2.0", default-features = false }

[lints]
workspace = true
