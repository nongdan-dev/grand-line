[package]
name = "_http_axum"
version = "0.0.0"
edition = "2024"

[lib]
name = "_http_axum"
path = "lib.rs"

[dependencies]
_core = { path = "../core", default-features = false }
async-graphql-axum = { version = "^7.2", default-features = false }
axum = { version = "^0.8", default-features = false, features = ["http1", "http2", "json", "query", "tokio", "multipart"] }
tower = { version = "^0.5", default-features = false }
tower-http = { version = "^0.7", default-features = false, features = ["cors", "normalize-path"] }
