[package]
name = "_core"
version = "0.0.0"
edition = "2024"

[lib]
name = "_core"
path = "lib.rs"

[features]
# db
sqlite = ["sea-orm/sqlx-sqlite", "sqlx/sqlite"]
mysql = ["sea-orm/sqlx-mysql", "sqlx/mysql"]
postgres = ["sea-orm/sqlx-postgres", "sqlx/postgres", "_proc/postgres"]
# debug macro flags
debug_macro_cli = ["_proc/debug_macro_cli"]
debug_macro_file = ["_proc/debug_macro_file"]
# model flags
model_created_at = ["_proc/model_created_at"]
model_updated_at = ["_proc/model_updated_at"]
model_deleted_at = ["_proc/model_deleted_at"]
model_by_id = ["_proc/model_by_id"]
# resolver flags
resolver_tx = ["_proc/resolver_tx"]
resolver_ctx = ["_proc/resolver_ctx"]
resolver_include_deleted = ["_proc/resolver_include_deleted"]
resolver_permanent_delete = ["_proc/resolver_permanent_delete"]
# packages
tracing = ["async-graphql/tracing"]
auth = ["_proc/auth"]
authz = ["_proc/authz"]

[dependencies]
_proc = { path = "../macro_proc", default-features = false }
_utils = { path = "../macro_utils", default-features = false }
_utils_proc = { path = "../macro_utils_proc", default-features = false }
async-graphql = { version = "^7.2", default-features = false, features = ["chrono", "chrono-duration", "chrono-tz", "dataloader", "decimal", "string_number", "boxed-trait"] }
async-trait = { version = "^0.1", default-features = false }
chrono = { version = "^0.4", default-features = false, features = ["now", "serde"] }
sea-orm = { version = "^1.1", default-features = false, features = ["macros", "runtime-tokio-rustls", "with-chrono", "with-json", "with-rust_decimal"] }
serde = { version = "^1.0", default-features = false, features = ["derive", "std"] }
serde_json = { version = "^1.0", default-features = false }
serde_with = { version = "^3.21", default-features = false, features = ["macros"] }
sqlx = { version = "^0.9", default-features = false, features = ["chrono", "json", "macros", "migrate", "runtime-tokio", "rust_decimal"] }
thiserror = { version = "^2.0", default-features = false }
tokio = { version = "^1.52", default-features = false, features = ["full"] }
ulid = { version = "^1.2", default-features = false, features = ["std"] }

[lints]
workspace = true
