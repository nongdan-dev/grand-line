[package]
name = "_rand_utils"
version = "0.0.0"
edition = "2024"

[lib]
name = "_rand_utils"
path = "lib.rs"

[dependencies]
_core = { path = "../core", default-features = false }
argon2 = { version = "^0.5", default-features = false, features = ["alloc", "password-hash"] }
base64 = { version = "^0.22", default-features = false }
hmac = { version = "^0.13", default-features = false }
rand = { version = "^0.10", default-features = false, features = ["thread_rng"] }
rand_core = { version = "^0.10", default-features = false }
serde = { version = "^1.0", default-features = false }
serde_qs = { version = "^1.1", default-features = false }
sha2 = { version = "^0.11", default-features = false }
subtle = { version = "^2.6", default-features = false }
thiserror = { version = "^2.0", default-features = false }
zxcvbn = { version = "^3.1", default-features = false }

[lints]
workspace = true
