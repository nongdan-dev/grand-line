[package]
name = "_i18n"
version = "0.0.0"
edition = "2024"

[lib]
name = "_i18n"
path = "lib.rs"

[dependencies]
_core = { path = "../core", default-features = false }
fixed_decimal = { version = "^0.7", default-features = false }
icu_calendar = { version = "^2.2", default-features = false }
icu_datetime = { version = "^2.2", default-features = false, features = ["serde"] }
icu_decimal = { version = "^2.2", default-features = false, features = ["serde"] }
icu_locale_core = { version = "^2.2", default-features = false }
icu_plurals = { version = "^2.2", default-features = false, features = ["serde"] }
icu_provider_blob = { version = "^2.2", default-features = false }
serde = { version = "^1.0", default-features = false }
thiserror = { version = "^2.0", default-features = false }

[lints]
workspace = true
